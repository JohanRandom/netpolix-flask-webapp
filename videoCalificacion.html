<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netpolix - Reseñas de Videos</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="icon" type="image/x-icon" href="screenshots/netpolix.ico">
    <link rel="stylesheet" href="static/css/styles.css">
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark fixed-top">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="index.html">NETPOLIX</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link" href="index.html">Inicio</a></li>
                    <li class="nav-item"><a class="nav-link" href="video.html">Películas</a></li>
                    <li class="nav-item"><a class="nav-link" href="categorias.html">Categorías</a></li>
                    <li class="nav-item"><a class="nav-link" href="calificaciones.html">Calificaciones</a></li>
                    <li class="nav-item"><a class="nav-link" href="videoCategoria.html">Video Categoría</a></li>
                    <li class="nav-item"><a class="nav-link active" href="videoCalificacion.html">Video Calificación</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container py-5 mt-4">

        <div class="mb-5">
            <h1 class="fw-bold text-white">
                <i class="bi bi-star-half text-danger"></i>
                Gestión de Reseñas
            </h1>
            <p class="text-muted">Asigna calificaciones a tus películas favoritas.</p>
        </div>

        <div class="row">
            <div class="col-md-5">
                <div class="card shadow border-0">
                    <div class="card-body p-4">
                        
                        <ul class="nav nav-tabs mb-4 d-flex" id="tabsReseñas">
                            <li class="nav-item flex-fill"><button class="nav-link active w-100" data-bs-toggle="tab" data-bs-target="#crear">CALIFICAR</button></li>
                            <li class="nav-item flex-fill"><button class="nav-link w-100" data-bs-toggle="tab" data-bs-target="#eliminar">QUITAR</button></li>
                        </ul>

                        <div class="tab-content mt-3">
                            <div class="tab-pane fade show active" id="crear">
                                <h4 class="mb-3 text-danger">Nueva Puntuación</h4>
                                <form id="formVideoCalificacion">
                                    <div class="mb-3">
                                        <label class="form-label">ID del Video</label>
                                        <input type="number" id="video_id" class="form-control" placeholder="ID Película" required>
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label">ID de la Calificación</label>
                                        <input type="number" id="calificacion_id" class="form-control" placeholder="ID Puntuación" required>
                                    </div>
                                    <button class="btn btn-netflix w-100">Registrar Reseña</button>
                                </form>
                            </div>

                            <div class="tab-pane fade" id="eliminar">
                                <h4 class="mb-3 text-danger">Eliminar Reseña</h4>
                                <form id="formEliminarVideoCalificacion">
                                    <div class="mb-3">
                                        <label class="form-label">ID del registro</label>
                                        <input type="number" id="eliminar_id" class="form-control" required>
                                    </div>
                                    <button class="btn btn-danger w-100">Borrar</button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-md-7 mt-4 mt-md-0">
                <div class="card shadow border-0">
                    <div class="card-body p-4">
                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <h4 class="mb-0 text-white">Reseñas Registradas</h4>
                            <button class="btn btn-outline-light btn-sm" onclick="obtenerVideoCalificacion()">
                                <i class="bi bi-arrow-clockwise"></i> Actualizar
                            </button>
                        </div>

                        <div class="table-responsive">
                            <table class="table table-hover align-middle">
                                <thead>
                                    <tr>
                                        <th>ID</th>
                                        <th>ID Video</th>
                                        <th>ID Calificación</th>
                                    </tr>
                                </thead>
                                <tbody id="tablaVideoCalificacion">
                                    <!-- Cargado por JS -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="static/js/videoCalificacion.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
