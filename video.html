<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netpolix - Gestión de Videos</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <!-- Icono -->
    <link rel="icon" type="image/x-icon" href="screenshots/netpolix.ico">
    <!-- CSS Personalizado con estilo Netflix -->
    <link rel="stylesheet" href="static/css/styles.css">
</head>

<body>

    <!-- BARRA DE NAVEGACIÓN -->
    <nav class="navbar navbar-expand-lg navbar-dark fixed-top">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="index.html">NETPOLIX</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link" href="index.html">Inicio</a></li>
                    <li class="nav-item"><a class="nav-link active" href="video.html">Películas</a></li>
                    <li class="nav-item"><a class="nav-link" href="categorias.html">Categorías</a></li>
                    <li class="nav-item"><a class="nav-link" href="calificaciones.html">Calificaciones</a></li>
                    <li class="nav-item"><a class="nav-link" href="videoCategoria.html">Video Categoría</a></li>
                    <li class="nav-item"><a class="nav-link" href="videoCalificacion.html">Video Calificación</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container py-5 mt-4">

        <!-- TÍTULO DE LA SECCIÓN -->
        <div class="mb-5">
            <h1 class="fw-bold text-white">
                <i class="bi bi-camera-reels text-danger"></i>
                Gestión de Videos
            </h1>
            <p class="text-muted">Administra el catálogo de películas del sistema.</p>
        </div>

        <div class="row">
            <!-- PANEL DE OPERACIONES (Izquierda) -->
            <div class="col-md-5">
                <div class="card shadow border-0">
                    <div class="card-body p-4">
                        
                        <!-- Pestañas de Navegación del Formulario -->
                        <ul class="nav nav-tabs mb-4 d-flex" id="tabsOperaciones">
                            <li class="nav-item flex-fill"><button class="nav-link active w-100" data-bs-toggle="tab" data-bs-target="#crear">CREAR</button></li>
                            <li class="nav-item flex-fill"><button class="nav-link w-100" data-bs-toggle="tab" data-bs-target="#editar">EDITAR</button></li>
                            <li class="nav-item flex-fill"><button class="nav-link w-100" data-bs-toggle="tab" data-bs-target="#eliminar">ELIMINAR</button></li>
                            <li class="nav-item flex-fill"><button class="nav-link w-100" data-bs-toggle="tab" data-bs-target="#buscar">BUSCAR</button></li>
                        </ul>

                        <div class="tab-content mt-3">
                            <!-- Formulario para CREAR -->
                            <div class="tab-pane fade show active" id="crear">
                                <h4 class="mb-3 text-danger">Nuevo Video</h4>
                                <form id="formCategoria"> <!-- Mantengo ID original para no romper JS -->
                                    <div class="mb-3">
                                        <label class="form-label">Título</label>
                                        <input type="text" id="titulo" class="form-control" placeholder="Ej: Batman Inicia" required>
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label">Año</label>
                                        <input type="number" id="anio" class="form-control" placeholder="Ej: 2005" required>
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label">Duración (min)</label>
                                        <input type="number" id="duracion" class="form-control" placeholder="Ej: 140" required>
                                    </div>
                                    <button class="btn btn-netflix w-100 py-2">Guardar Película</button>
                                </form>
                            </div>

                            <!-- Formulario para EDITAR -->
                            <div class="tab-pane fade" id="editar">
                                <h4 class="mb-3 text-warning">Editar Película</h4>
                                <form id="formEditarVideo">
                                    <div class="mb-3">
                                        <label class="form-label">ID del Video</label>
                                        <input type="number" id="editar_id" class="form-control" placeholder="Ej: 1" required>
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label">Nuevo Título</label>
                                        <input type="text" id="editar_titulo" class="form-control" placeholder="Ej: Batman: El Caballero de la Noche" required>
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label">Año</label>
                                        <input type="number" id="editar_anio" class="form-control" placeholder="Ej: 2008" required>
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label">Duración</label>
                                        <input type="number" id="editar_duracion" class="form-control" placeholder="Ej: 152" required>
                                    </div>
                                    <button class="btn btn-warning w-100 py-2 text-dark fw-bold">Actualizar</button>
                                </form>
                            </div>

                            <!-- Formulario para ELIMINAR -->
                            <div class="tab-pane fade" id="eliminar">
                                <h4 class="mb-3 text-danger">Eliminar Registro</h4>
                                <form id="formEliminarVideo">
                                    <div class="mb-3">
                                        <label class="form-label">ID del Video a eliminar</label>
                                        <input type="number" id="eliminar_id" class="form-control" placeholder="Ej: 5" required>
                                    </div>
                                    <button class="btn btn-danger w-100 py-2">Eliminar Definitivamente</button>
                                </form>
                            </div>

                            <!-- Herramienta de BUSCAR -->
                            <div class="tab-pane fade" id="buscar">
                                <h4 class="mb-3">Filtrar Catálogo</h4>
                                <div class="mb-3">
                                    <input type="text" id="inputBuscar" class="form-control" placeholder="Escribe título o año..." onkeyup="buscarVideos()">
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- TABLA DE RESULTADOS (Derecha) -->
            <div class="col-md-7 mt-4 mt-md-0">
                <div class="card shadow border-0">
                    <div class="card-body p-4">
                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <h4 class="mb-0 text-white">Catálogo Registrado</h4>
                            <button class="btn btn-outline-light btn-sm" onclick="obtenerVideos()">
                                <i class="bi bi-arrow-clockwise"></i> Refrescar
                            </button>
                        </div>

                        <div class="table-responsive">
                            <table class="table table-hover align-middle">
                                <thead>
                                    <tr>
                                        <th>ID</th>
                                        <th>Título</th>
                                        <th>Año</th>
                                        <th>Duración</th>
                                    </tr>
                                </thead>
                                <tbody id="tablaVideos">
                                    <!-- Cargado por JS -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts de Lógica -->
    <script src="static/js/video.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
